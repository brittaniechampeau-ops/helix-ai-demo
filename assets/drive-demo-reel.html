<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>DRIVE Demo Reel</title>
<style>
:root{--bg:#07090d;--panel:#0e1218;--panel2:#141a23;--border:#263040;--text:#eef1f6;--muted:#8995a8;--purple:#8b7fec;--green:#3bbfa3;--amber:#f0a832;--red:#e76464}*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--text);font:15px Inter,system-ui,sans-serif;overflow:hidden}.app{height:100vh;display:grid;grid-template-rows:52px 1fr}.nav{display:flex;align-items:center;gap:22px;padding:0 28px;border-bottom:1px solid var(--border);background:#050709}.brand{font-weight:800;color:var(--purple);margin-right:8px}.nav span{color:var(--muted);font-size:13px}.nav span.active{color:#fff}.stage{padding:34px 42px;position:relative}.topline{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:24px}.eyebrow{font-size:11px;text-transform:uppercase;letter-spacing:.09em;color:var(--purple);font-weight:700}.title{font-size:30px;font-weight:750;margin:6px 0}.sub{color:var(--muted);line-height:1.5}.badge{padding:7px 11px;border-radius:999px;background:#18201f;color:var(--green);font-size:12px}.grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}.card{background:var(--panel);border:1px solid var(--border);border-radius:12px;padding:20px}.card h3{margin:0 0 10px;font-size:15px}.value{font-size:20px;line-height:1.4}.detail{color:#b9c2d0;line-height:1.55}.chips{display:flex;flex-wrap:wrap;gap:8px;margin-top:14px}.chip{padding:5px 9px;border-radius:999px;background:var(--panel2);color:var(--muted);font-size:12px}.metric{font-size:34px;font-weight:800;color:var(--green)}.bar{height:8px;border-radius:8px;background:var(--panel2);overflow:hidden;margin-top:14px}.bar span{display:block;height:100%;background:var(--purple)}.action{position:absolute;right:42px;bottom:34px;background:var(--purple);padding:11px 17px;border-radius:8px;font-weight:650}.cursor{position:fixed;z-index:5;width:24px;height:24px;left:85%;top:90%;transition:left .65s ease,top .65s ease;filter:drop-shadow(0 3px 4px #000)}.cursor:before{content:'➤';display:block;color:white;font-size:25px;transform:rotate(-35deg)}.cursor.click:after{content:'';position:absolute;inset:-9px;border:2px solid var(--purple);border-radius:50%;animation:pulse .6s ease-out}.caption{position:fixed;left:50%;bottom:20px;transform:translateX(-50%);background:#050709e8;border:1px solid var(--border);border-radius:8px;padding:10px 16px;max-width:75%;text-align:center;color:#d8dee8;z-index:4}.progress{position:fixed;left:0;bottom:0;height:4px;background:var(--purple);transition:width .5s ease}@keyframes pulse{from{transform:scale(.3);opacity:1}to{transform:scale(1.5);opacity:0}}.fade{animation:fade .35s ease}@keyframes fade{from{opacity:.25;transform:translateY(7px)}to{opacity:1;transform:none}}
</style></head><body><div class="app"><div class="nav"><div class="brand">✦ DRIVE</div><span>Hub</span><span>Discover</span><span>Resolve</span><span>Intuit</span><span>Visualize</span><span>Execute</span><span>Portfolio</span><span>Executive</span></div><main class="stage" id="stage"></main></div><div class="cursor" id="cursor"></div><div class="caption" id="caption"></div><div class="progress" id="progress"></div>
<script>
const orgs=[
{name:'Waverly Creative',label:'Solo creative agency · under $500K',industry:'Creative services',profile:'Expert services · Founder-led · Referral motion',buyer:'VC-backed founders before a funding or category transition',constraint:'Authority is visible, but referrals are informal and qualified pipeline is inconsistent.',conflict:'Marketing calls an engaged account qualified; sales requires authority, urgency, and a confirmed next step.',signal:'Warm introductions convert better than broad content, but no introduction cadence is tracked.',position:'The strategic narrative partner for founders who need the market to understand what changed before the next financing event.',rec:'Install a governed referral motion with a weekly ask cadence and qualification gate.',metric:'Qualified referral pipeline',score:74},
{name:'Northstar AI Implementation',label:'3-person AI implementation firm · $750K',industry:'AI implementation services',profile:'Productized services · Early traction · Founder-led sales',buyer:'Operations leaders with an approved AI pilot stalled before deployment',constraint:'The founders perform solution design before urgency, authority, and budget are confirmed.',conflict:'A successful pilot is being mistaken for deployment readiness.',signal:'Prospects engage on AI capability but stall when workflow ownership and deployment responsibility surface.',position:'The implementation partner that repairs the operating model around an AI pilot so it can enter production.',rec:'Enforce qualification before solution work and standardize the founder-led sales path.',metric:'Senior hours protected',score:77},

{name:'Atlas Workflow Cloud',label:'$10M B2B SaaS organization · 50 employees',industry:'B2B SaaS',profile:'Software product · Scaling · Enterprise sales',buyer:'Enterprise operations executives replacing fragmented workflow tools',constraint:'Strong positioning is not consistently translated across the buying committee or sales-to-success handoff.',conflict:'Sales calls signature the finish line; customer success requires a deployment owner and accepted outcome.',signal:'Single-threaded deals stall when security, finance, and adoption owners enter late.',position:'The governed workflow layer for enterprise teams that need automation without losing ownership, evidence, or control.',rec:'Map the enterprise decision system and create an accepted sales-to-delivery contract.',metric:'Enterprise stage conversion',score:79},

const stages=[
{nav:0,caption:'Select the synthetic engagement and inspect pipeline completeness.',render:o=>`<div class="topline"><div><div class="eyebrow">DRIVE Hub</div><div class="title">${o.name}</div><div class="sub">${o.label}</div></div><div class="badge">ACTIVE ENGAGEMENT</div></div><div class="grid"><div class="card"><h3>Organization</h3><div class="value">${o.industry}</div><div class="chips"><span class="chip">Discover complete</span><span class="chip">Resolve complete</span><span class="chip">Intuit complete</span><span class="chip">Portfolio active</span></div></div><div class="card"><h3>Operating profile</h3><div class="detail">${o.profile}</div></div></div><div class="action">Open Discover →</div>`},
{nav:1,caption:'Confirm the operating profile, priority buyer, and binding constraint.',render:o=>`<div class="topline"><div><div class="eyebrow">Discover</div><div class="title">Engagement context</div><div class="sub">One authoritative profile follows the organization through every tool.</div></div><div class="badge">CONTEXT READY</div></div><div class="grid"><div class="card"><h3>Priority buyer</h3><div class="value">${o.buyer}</div></div><div class="card"><h3>Observed constraint</h3><div class="detail">${o.constraint}</div></div><div class="card"><h3>Operating profile</h3><div class="detail">${o.profile}</div></div><div class="card"><h3>Baseline status</h3><div class="detail">Business metric named. Client baseline and unit economics require workshop validation.</div></div></div><div class="action">Resolve definitions →</div>`},
{nav:2,caption:'Resolve conflicting definitions before using them in recommendations or automation.',render:o=>`<div class="topline"><div><div class="eyebrow">Resolve</div><div class="title">Canonical decision context</div><div class="sub">Conflicting definitions are visible, owned, and actionable.</div></div><div class="badge">1 DECISION REQUIRED</div></div><div class="card"><h3>Qualified opportunity conflict</h3><div class="value">${o.conflict}</div><div class="chips"><span class="chip">Marketing definition</span><span class="chip">Sales definition</span><span class="chip">Owner required</span></div></div><div class="action">Review signals →</div>`},
{nav:3,caption:'Star the market signal that should affect recommendation ranking.',render:o=>`<div class="topline"><div><div class="eyebrow">Intuit</div><div class="title">Priority market signal</div><div class="sub">Signals remain evidence, not conclusions.</div></div><div class="badge">HIGH CONFIDENCE</div></div><div class="card"><h3>Advisor-starred signal</h3><div class="value">${o.signal}</div><div class="chips"><span class="chip">Synthetic intake</span><span class="chip">Public evidence</span><span class="chip">Validation required</span></div></div><div class="action">Approve position →</div>`},
{nav:4,caption:'Translate the context into a buyer-specific, testable market position.',render:o=>`<div class="topline"><div><div class="eyebrow">Visualize</div><div class="title">Approved market position</div><div class="sub">The position is specific enough to test in qualified conversations.</div></div><div class="badge">APPROVED</div></div><div class="card"><h3>Positioning statement</h3><div class="value">${o.position}</div></div><div class="action">Build action architecture →</div>`},
{nav:5,caption:'Sequence the intervention with an owner, cadence, and measurable definition of done.',render:o=>`<div class="topline"><div><div class="eyebrow">Execute</div><div class="title">90-day action architecture</div><div class="sub">Track C · repair or validate the binding constraint before scaling.</div></div><div class="badge">OWNER ASSIGNED</div></div><div class="grid"><div class="card"><h3>Foundation</h3><div class="detail">Approve the owner, baseline, target, and evidence standard.</div></div><div class="card"><h3>Activation</h3><div class="detail">Run the bounded intervention against the named constraint.</div></div><div class="card"><h3>Optimization</h3><div class="detail">Review the result and record continue, revise, or stop.</div></div><div class="card"><h3>Primary measure</h3><div class="value">${o.metric}</div></div></div><div class="action">Review recommendations →</div>`},
{nav:6,caption:'Review why the recommendation ranks first and what public evidence suppressed.',render:o=>`<div class="topline"><div><div class="eyebrow">Ranked recommendation review</div><div class="title">#1 ${o.rec}</div><div class="sub">Recommendation confidence and measurement confidence remain separate.</div></div><div class="badge">${o.score}/100 CONFIDENCE</div></div><div class="grid"><div class="card"><h3>Why now</h3><div class="detail">${o.constraint}</div></div><div class="card"><h3>Business-value measure</h3><div class="metric">${o.metric}</div><div class="bar"><span style="width:${o.score}%"></span></div></div><div class="card"><h3>Evidence lineage</h3><div class="detail">Discover constraint · Resolve conflict · Intuit signal · accepted public evidence</div></div><div class="card"><h3>Advisor decision</h3><div class="detail">Accept, revise, or reject before the recommendation enters the client portfolio.</div></div></div><div class="action">Accept recommendation</div>`},
{nav:7,caption:'Show the client only the decision, owner, progress, and measurable outcome.',render:o=>`<div class="topline"><div><div class="eyebrow">Client executive view</div><div class="title">Priority decision and progress</div><div class="sub">Internal diagnostics are removed from the client-safe view.</div></div><div class="badge">APPROVED PRIORITY</div></div><div class="grid"><div class="card"><h3>Approved action</h3><div class="value">${o.rec}</div></div><div class="card"><h3>Accountability</h3><div class="detail">Owner: Executive owner<br>Target: 90 days<br>Progress: 1 of 3 milestones</div><div class="bar"><span style="width:33%"></span></div></div><div class="card"><h3>Outcome measure</h3><div class="metric">${o.metric}</div></div><div class="card"><h3>Next decision</h3><div class="detail">Continue, revise, or stop after the bounded intervention produces measured evidence.</div></div></div>`}

const params=new URLSearchParams(location.search),all=params.get('all')==='1',start=Math.max(0,Math.min(7,Number(params.get('org')||0)));let oi=start,si=0;const stage=document.getElementById('stage'),caption=document.getElementById('caption'),cursor=document.getElementById('cursor'),progress=document.getElementById('progress'),nav=[...document.querySelectorAll('.nav span')];

function advance(){si++;if(si>=stages.length){si=0;if(all){oi++;if(oi>=orgs.length){clearInterval(timer);caption.textContent='DRIVE demonstration complete';return}}else{clearInterval(timer);caption.textContent=`${orgs[oi].name} demonstration complete`;return}}draw()}
draw();const timer=setInterval(advance,3600);
