<!doctype html>
<html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>GTM Enhancement Portfolio · DRIVE</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script><script src="/drive-runtime.js"></script>
<style>
:root{--bg:#07090d;--surface:#0e1218;--surface2:#141a23;--border:#222b39;--text:#e8eaf0;--muted:#8490a3;--purple:#8b7fec;--green:#3bbfa3;--amber:#f0a832;--red:#e76464}*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--text);font:14px Inter,system-ui,sans-serif}.pnav{height:44px;display:flex;align-items:center;gap:14px;padding:0 20px;border-bottom:1px solid var(--border);background:#050709}.pnav a{color:var(--muted);text-decoration:none}.pnav a.active,.pnav a:hover{color:var(--text)}.brand{font-weight:800;color:var(--purple)}main{max-width:1280px;margin:auto;padding:28px}.head{display:flex;justify-content:space-between;gap:20px;align-items:flex-start;margin-bottom:24px}h1{margin:0 0 6px;font-size:25px}.sub{color:var(--muted)}button,.btn{border:1px solid var(--border);background:var(--surface2);color:var(--text);border-radius:7px;padding:8px 12px;cursor:pointer}.primary{background:var(--purple);border-color:var(--purple)}.tabs{display:flex;gap:6px;margin:18px 0}.tab.active{border-color:var(--purple);color:#fff}.metrics{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;margin-bottom:20px}.metric,.card{background:var(--surface);border:1px solid var(--border);border-radius:10px}.metric{padding:15px}.metric b{display:block;font-size:22px;margin-bottom:4px}.metric span{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.06em}.toolbar{display:flex;gap:10px;margin-bottom:14px}.toolbar select{background:var(--surface);border:1px solid var(--border);color:var(--text);padding:8px;border-radius:7px}.list{display:grid;gap:10px}.card{padding:17px}.row{display:flex;justify-content:space-between;gap:18px}.eyebrow{font-size:10px;text-transform:uppercase;letter-spacing:.08em;color:var(--purple);font-weight:700}.title{font-size:16px;font-weight:700;margin:5px 0}.detail{color:#b6becc;line-height:1.5}.chips{display:flex;gap:6px;flex-wrap:wrap;margin-top:12px}.chip{font-size:11px;padding:3px 7px;border-radius:12px;background:var(--surface2);color:var(--muted)}.status-approved{color:var(--green)}.status-blocked{color:var(--red)}.empty{text-align:center;padding:60px;color:var(--muted)}dialog{width:min(760px,94vw);background:var(--surface);color:var(--text);border:1px solid var(--border);border-radius:12px;padding:22px}dialog::backdrop{background:#000a}.grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}.field{display:flex;flex-direction:column;gap:6px}.field.full{grid-column:1/-1}label{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.05em}input,textarea,select{background:#090c11;border:1px solid var(--border);color:var(--text);border-radius:7px;padding:9px;font:inherit}textarea{min-height:74px;resize:vertical}.actions{display:flex;justify-content:flex-end;gap:8px;margin-top:18px}.loading{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;color:var(--muted);z-index:20}@media(max-width:800px){.metrics{grid-template-columns:repeat(2,1fr)}.grid{grid-template-columns:1fr}.field.full{grid-column:auto}.head{flex-direction:column}}
</style></head><body>
<div id="authLoading" class="loading">Loading engagement portfolio…</div>
<nav class="pnav"><span class="brand">✦ DRIVE</span><a href="/hub.html">Hub</a><a href="/discover.html">Discover</a><a href="/resolve.html">Resolve</a><a href="/intuit.html">Intuit</a><a href="/visualize.html">Visualize</a><a href="/execute.html">Execute</a><a class="active" href="/portfolio.html">Portfolio</a></nav>
<main id="app" style="display:none"><div class="head"><div><h1 id="portfolioTitle">GTM Enhancement Portfolio</h1><div class="sub" id="portfolioSub">Decisions, evidence, ownership, and implementation progress</div></div><button class="primary" id="addBtn" onclick="openEditor()">Add enhancement</button></div>
<div class="tabs"><button class="tab active" data-view="internal" onclick="setView('internal')">Working register</button><button class="tab" data-view="executive" onclick="setView('executive')">Executive view</button></div>
<section class="metrics" id="metrics"></section><div class="toolbar"><select id="statusFilter" onchange="render()"><option value="">All statuses</option><option>Proposed</option><option>Approved</option><option>In progress</option><option>Blocked</option><option>Complete</option><option>Rejected</option></select><select id="priorityFilter" onchange="render()"><option value="">All priorities</option><option>Critical</option><option>High</option><option>Medium</option><option>Low</option></select></div><section class="list" id="enhancementList"></section></main>
<dialog id="editor"><form onsubmit="saveEnhancement(event)"><input type="hidden" id="fId"><div class="grid"><div class="field full"><label>Enhancement</label><input id="fTitle" required></div><div class="field full"><label>Observed constraint</label><textarea id="fConstraint" required></textarea></div><div class="field full"><label>Recommendation</label><textarea id="fRecommendation" required></textarea></div><div class="field"><label>Priority</label><select id="fPriority"><option>Critical</option><option>High</option><option selected>Medium</option><option>Low</option></select></div><div class="field"><label>Status</label><select id="fStatus"><option>Proposed</option><option>Approved</option><option>In progress</option><option>Blocked</option><option>Complete</option><option>Rejected</option></select></div><div class="field"><label>Owner</label><input id="fOwner"></div><div class="field"><label>Decision due</label><input id="fDue" type="date"></div><div class="field"><label>Expected impact</label><input id="fImpact" placeholder="Revenue, cycle time, risk, adoption…"></div><div class="field"><label>Success measure</label><input id="fMeasure"></div><div class="field full"><label>Evidence references</label><textarea id="fEvidence" placeholder="One per line: source type | source name | relevant observation"></textarea></div><div class="field full"><label>Milestones</label><textarea id="fMilestones" placeholder="One milestone per line"></textarea></div><div class="field full"><label>Internal notes (hidden from executive view)</label><textarea id="fNotes"></textarea></div></div><div class="actions"><button type="button" onclick="editor.close()">Cancel</button><button class="primary">Save enhancement</button></div></form></dialog>
<script>
const SUPA_URL='https://ilhljjkiijmjpwinovzj.supabase.co',SUPA_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImlsaGxqamtpaWptanB3aW5vdnpqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM2MTk4MjIsImV4cCI6MjA5OTE5NTgyMn0.w8asDSA-rXuaDfujC2dr4J-EKCzlCVABOuq3VQeeFsE';
const supa=supabase.createClient(SUPA_URL,SUPA_KEY),DriveAuth=DRIVE.createAuth(supa),OrgStore=DRIVE.createStore(supa,'portfolio');let currentUser=null,context=null,view='internal',canEdit=false,state={enhancements:[],events:[]};
const editor=document.getElementById('editor');
function localKey(){return'drive_portfolio_'+(context?.engagementId||currentUser?.email||'local')}
function lines(v){return v.split('\n').map(x=>x.trim()).filter(Boolean)}function esc(v){const d=document.createElement('div');d.textContent=v||'';return d.innerHTML}function id(){return crypto.randomUUID?crypto.randomUUID():Date.now().toString(36)}
async function loadPortfolio(){const cloud=await OrgStore.load('org_gtm_portfolio');if(cloud)state=cloud;else{const local=localStorage.getItem(localKey());if(local)try{state=JSON.parse(local)}catch(_){}}render()}
async function persist(eventType,itemId){state.events.push({id:id(),type:eventType,itemId,at:new Date().toISOString(),by:currentUser.email});localStorage.setItem(localKey(),JSON.stringify(state));const result=await OrgStore.save('org_gtm_portfolio',state);if(result?.error)console.info('Portfolio remains a local draft until its database migration is approved.');render()}
function setView(next){view=next;document.querySelectorAll('.tab').forEach(x=>x.classList.toggle('active',x.dataset.view===view));render()}
function metrics(){const a=state.enhancements,approved=a.filter(x=>['Approved','In progress','Complete'].includes(x.status)).length,complete=a.filter(x=>x.status==='Complete').length,owned=a.filter(x=>x.owner).length;return[{n:a.length,l:'Enhancements'},{n:approved,l:'Accepted'},{n:a.length?Math.round(complete/a.length*100)+'%':'0%',l:'Implemented'},{n:a.length?Math.round(owned/a.length*100)+'%':'0%',l:'Owner assigned'},{n:state.events.length,l:'Recorded changes'}]}
function render(){document.getElementById('metrics').innerHTML=metrics().map(m=>`<div class="metric"><b>${m.n}</b><span>${m.l}</span></div>`).join('');const sf=document.getElementById('statusFilter').value,pf=document.getElementById('priorityFilter').value;const items=state.enhancements.filter(x=>(!sf||x.status===sf)&&(!pf||x.priority===pf));document.getElementById('enhancementList').innerHTML=items.length?items.map(card).join(''):'<div class="card empty">No enhancements match this view.</div>'}
function card(x){const evidence=(x.evidence||[]).length,milestones=(x.milestones||[]).length;return`<article class="card"><div class="row"><div><div class="eyebrow">${esc(x.priority)} priority · <span class="status-${x.status.toLowerCase().replaceAll(' ','-')}">${esc(x.status)}</span></div><div class="title">${esc(x.title)}</div><div class="detail"><b>Constraint:</b> ${esc(x.constraint)}</div><div class="detail" style="margin-top:6px"><b>Recommendation:</b> ${esc(x.recommendation)}</div></div>${view==='internal'?`<button onclick="openEditor('${x.id}')">Edit</button>`:''}</div><div class="chips"><span class="chip">Owner: ${esc(x.owner||'Unassigned')}</span><span class="chip">Due: ${esc(x.due||'Not set')}</span><span class="chip">Evidence: ${evidence}</span><span class="chip">Milestones: ${milestones}</span>${x.impact?`<span class="chip">Impact: ${esc(x.impact)}</span>`:''}</div>${view==='internal'&&x.notes?`<div class="detail" style="margin-top:12px"><b>Internal:</b> ${esc(x.notes)}</div>`:''}</article>`}
function openEditor(itemId){if(!canEdit)return;const x=state.enhancements.find(i=>i.id===itemId)||{};for(const [field,key]of[['fId','id'],['fTitle','title'],['fConstraint','constraint'],['fRecommendation','recommendation'],['fPriority','priority'],['fStatus','status'],['fOwner','owner'],['fDue','due'],['fImpact','impact'],['fMeasure','measure'],['fNotes','notes']])document.getElementById(field).value=x[key]||'';document.getElementById('fPriority').value=x.priority||'Medium';document.getElementById('fStatus').value=x.status||'Proposed';document.getElementById('fEvidence').value=(x.evidence||[]).join('\n');document.getElementById('fMilestones').value=(x.milestones||[]).join('\n');editor.showModal()}
function saveEnhancement(e){e.preventDefault();const itemId=document.getElementById('fId').value||id(),existing=state.enhancements.find(x=>x.id===itemId);const item={id:itemId,title:fTitle.value.trim(),constraint:fConstraint.value.trim(),recommendation:fRecommendation.value.trim(),priority:fPriority.value,status:fStatus.value,owner:fOwner.value.trim(),due:fDue.value,impact:fImpact.value.trim(),measure:fMeasure.value.trim(),evidence:lines(fEvidence.value),milestones:lines(fMilestones.value),notes:fNotes.value.trim(),updatedAt:new Date().toISOString()};if(existing)Object.assign(existing,item);else state.enhancements.unshift(item);editor.close();persist(existing?'enhancement_updated':'enhancement_created',itemId)}
DriveAuth.onChange(async(_event,session)=>{authLoading.style.display='none';if(!session){location.href='/hub.html';return}currentUser=session.user;OrgStore.init(session);context=await OrgStore.resolveContext();canEdit=context.permissions.isAdmin||context.permissions.isOwner;portfolioTitle.textContent=(context.organizationName||context.clientName||'GTM')+' Enhancement Portfolio';portfolioSub.textContent='Decisions, evidence, ownership, and implementation progress';addBtn.style.display=canEdit?'':'none';if(!canEdit){view='executive';document.querySelector('[data-view="internal"]').style.display='none';document.querySelector('[data-view="executive"]').classList.add('active')}app.style.display='block';await loadPortfolio()});
</script></body></html>
