<html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Practice Intelligence · DRIVE</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script><script src="/drive-runtime.js"></script>
<style>
:root{--bg:#07090d;--surface:#0e1218;--surface2:#141a23;--border:#222b39;--text:#e8eaf0;--muted:#8490a3;--purple:#8b7fec;--green:#3bbfa3;--amber:#f0a832}*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--text);font:14px Inter,system-ui,sans-serif}.pnav{height:44px;display:flex;align-items:center;gap:14px;padding:0 20px;border-bottom:1px solid var(--border);background:#050709}.pnav a{color:var(--muted);text-decoration:none}.pnav a.active{color:var(--text)}.brand{font-weight:800;color:var(--purple)}main{max-width:1280px;margin:auto;padding:28px}h1{margin:0 0 6px;font-size:25px}.sub{color:var(--muted)}.section{margin-top:24px}.section h2{font-size:15px;margin:0 0 10px}.metrics{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-top:22px}.metric,.panel{background:var(--surface);border:1px solid var(--border);border-radius:10px}.metric{padding:16px}.metric b{display:block;font-size:24px;margin-bottom:4px}.metric span{color:var(--muted);font-size:10px;text-transform:uppercase;letter-spacing:.06em}.metric small{display:block;color:var(--muted);margin-top:7px}.grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}.panel{padding:17px}.panel h3{font-size:12px;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);margin:0 0 12px}.bar{height:7px;background:var(--surface2);border-radius:5px;overflow:hidden;margin-top:10px}.bar span{display:block;height:100%;background:var(--green)}table{width:100%;border-collapse:collapse}.table{overflow:auto}.table th,.table td{text-align:left;padding:11px 9px;border-bottom:1px solid var(--border);white-space:nowrap}.table th{color:var(--muted);font-size:10px;text-transform:uppercase;letter-spacing:.05em}.signal{color:var(--amber)}.loading{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;color:var(--muted);z-index:10}.empty{padding:40px;text-align:center;color:var(--muted)}@media(max-width:850px){.metrics{grid-template-columns:repeat(2,1fr)}.grid{grid-template-columns:1fr}}
</style></head><body>

<main id="app" style="display:none"><h1>Practice Intelligence</h1><div class="sub">Delivery economics, recommendation adoption, implementation velocity, outcomes, and expansion signals</div><section class="metrics" id="metrics"></section><section class="section grid"><div class="panel" id="adoptionPanel"></div><div class="panel" id="economicsPanel"></div></section><section class="section"><h2>Engagement portfolio</h2><div class="panel table" id="engagementTable"></div></section></main>
<script>
const SUPA_URL='https://ilhljjkiijmjpwinovzj.supabase.co';
const REAL_SUPA_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImlsaGxqamtpaWptanB3aW5vdnpqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM2MTk4MjIsImV4cCI6MjA5OTE5NTgyMn0.w8asDSA-rXuaDfujC2dr4J-EKCzlCVABOuq3VQeeFsE';
const supa=supabase.createClient(SUPA_URL,REAL_SUPA_KEY),DriveAuth=DRIVE.createAuth(supa),OrgStore=DRIVE.createStore(supa,'practice');
function esc(v){const d=document.createElement('div');d.textContent=v??'';return d.innerHTML}function pct(n,d){return d?Math.round(n/d*100):0}function money(v){return'$'+Number(v||0).toLocaleString()}
function summarize(rows,engagements){const names=new Map((engagements||[]).map(e=>[e.id,e.org_name||e.client_name||'Unnamed engagement'])),all=[];for(const row of rows||[]){const data=row.data||{},enhancements=data.enhancements||[],proposals=data.proposals||[];all.push({orgId:row.org_id,name:names.get(row.org_id)||'Engagement',enhancements,proposals})}const enhancements=all.flatMap(x=>x.enhancements),proposals=all.flatMap(x=>x.proposals),accepted=proposals.filter(x=>x.decision==='accepted').length,rejected=proposals.filter(x=>x.decision==='rejected').length,decided=accepted+rejected,complete=enhancements.filter(x=>x.status==='Complete').length,measured=enhancements.filter(x=>x.actual).length,invested=enhancements.reduce((n,x)=>n+(Number(x.consultantHours)||0),0),saved=enhancements.reduce((n,x)=>n+(Number(x.clientHoursSaved)||0),0),expansion=enhancements.filter(x=>['Discuss','Qualified'].includes(x.expansionSignal)),expansionValue=expansion.reduce((n,x)=>n+(Number(x.expansionValue)||0),0),completedMilestones=enhancements.flatMap(x=>x.milestones||[]).filter(x=>typeof x==='object'&&x.complete&&x.completedAt),onTimeMilestones=completedMilestones.filter(x=>!x.due||x.completedAt<=x.due).length;return{all,enhancements,proposals,accepted,rejected,decided,complete,measured,invested,saved,expansion,expansionValue,completedMilestones,onTimeMilestones}}
function render(s){const adoption=pct(s.accepted,s.decided),implementation=pct(s.complete,s.enhancements.filter(x=>x.status!=='Rejected').length),velocity=pct(s.onTimeMilestones,s.completedMilestones.length),leverage=s.invested?Math.round(s.saved/s.invested*10)/10:0;metrics.innerHTML=[['Engagements',s.all.length,'With portfolio data'],['Recommendation adoption',adoption+'%',`${s.accepted} accepted · ${s.rejected} rejected`],['Implementation',implementation+'%',`${s.complete} complete`],['Outcomes measured',s.measured,`${pct(s.measured,s.enhancements.length)}% of enhancements`],['Consultant hours',s.invested,'Recorded delivery effort'],['Client hours saved',s.saved,'Recorded operating leverage'],['Expansion signals',s.expansion.length,`${money(s.expansionValue)} potential value`],['Milestone velocity',velocity+'%',`${s.onTimeMilestones} on time`]].map(x=>`<div class="metric"><b>${esc(x[1])}</b><span>${esc(x[0])}</span><small>${esc(x[2])}</small></div>`).join('');adoptionPanel.innerHTML=`<h3>Recommendation conversion</h3><div><b>${adoption}%</b> of decided recommendations accepted</div><div class="bar"><span style="width:${adoption}%"></span></div><div class="sub" style="margin-top:12px">${s.proposals.length} generated · ${s.decided} decided · ${s.accepted} accepted</div>`;economicsPanel.innerHTML=`<h3>Delivery economics</h3><div><b>${leverage}×</b> client-hours-saved leverage</div><div class="bar"><span style="width:${Math.min(leverage*20,100)}%"></span></div><div class="sub" style="margin-top:12px">${s.invested} consultant hours · ${s.saved} client hours saved</div>`;engagementTable.innerHTML=s.all.length?`<table><thead><tr><th>Engagement</th><th>Enhancements</th><th>Accepted</th><th>Complete</th><th>Outcomes</th><th>Hours saved</th><th>Expansion</th></tr></thead><tbody>${s.all.map(g=>{const accepted=g.proposals.filter(x=>x.decision==='accepted').length,complete=g.enhancements.filter(x=>x.status==='Complete').length,outcomes=g.enhancements.filter(x=>x.actual).length,saved=g.enhancements.reduce((n,x)=>n+(Number(x.clientHoursSaved)||0),0),signals=g.enhancements.filter(x=>['Discuss','Qualified'].includes(x.expansionSignal)).length;return`<tr><td>${esc(g.name)}</td><td>${g.enhancements.length}</td><td>${accepted}</td><td>${complete}</td><td>${outcomes}</td><td>${saved}</td><td class="${signals?'signal':''}">${signals}</td></tr>`}).join('')}</tbody></table>`:'<div class="empty">No portfolio data is available yet.</div>'}
DriveAuth.onChange(async(_event,session)=>{authLoading.style.display='none';if(!session){location.href='/hub.html';return}OrgStore.init(session);const context=await OrgStore.resolveContext();if(!context.permissions.isAdmin){location.href='/hub.html';return}const[{data:portfolios,error},{data:engagements}]=await Promise.all([supa.from('org_gtm_portfolio').select('org_id,data,updated_at'),supa.from('drive_engagements').select('id,client_name,org_name')]);if(error){engagementTable.innerHTML='<div class="empty">Practice metrics could not be loaded.</div>';app.style.display='block';return}render(summarize(portfolios,engagements));app.style.display='block'});
</script></body></html>
