<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Resolve — Taxonomy Workbench</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:         #07090C;
  --surface:    #0E1218;
  --surface2:   #131920;
  --surface3:   #171F2A;
  --accent:     #3BBFA3;
  --accent-dim: #1E6B5E;
  --accent-bg:  #0D2E27;
  --blue:       #4BA8C8;
  --blue-dim:   #1a4a6b;
  --blue-bg:    #0D2535;
  --purple:     #9B8FE8;
  --purple-dim: #3a2a6b;
  --purple-bg:  #1a1535;
  --text:       #E8EDF3;
  --muted:      #6B7A8D;
  --faint:      #2A3544;
  --border:     #1C2535;
  --border2:    #243040;
  --font: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Segoe UI', sans-serif;
  --mono: 'SF Mono', 'Fira Code', monospace;
}

body {
  font-family: var(--font);
  background: var(--bg);
  color: var(--text);
  height: 100vh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  font-size: 14px;
}

/* ── LOGIN SCREEN ── */
#login-screen {
  display: none;
  position: fixed; inset: 0;
  background: var(--bg);
  z-index: 100;
  align-items: center;
  justify-content: center;
}
#login-screen.visible { display: flex; }

.login-card {
  background: var(--surface);
  border: 1px solid var(--border2);
  border-radius: 14px;
  padding: 40px;
  width: 380px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 24px;
}
.login-logo-mark {
  width: 48px; height: 48px;
  background: linear-gradient(135deg, var(--blue-dim) 0%, var(--blue) 100%);
  border-radius: 12px;
  display: flex; align-items: center; justify-content: center;
  font-size: 22px; color: #fff; font-weight: 700;
}
.login-title {
  font-size: 22px; font-weight: 600; letter-spacing: -0.3px;
  text-align: center; margin-bottom: 4px;
}
.login-sub { font-size: 13px; color: var(--muted); text-align: center; }
.login-form { width: 100%; display: flex; flex-direction: column; gap: 12px; }
.login-input {
  width: 100%;
  background: var(--surface2); border: 1px solid var(--border2);
  border-radius: 8px; padding: 10px 14px; font-size: 14px; color: var(--text);
  font-family: inherit; outline: none; transition: border-color 0.12s;
}
.login-input:focus { border-color: var(--blue); }
.login-input::placeholder { color: var(--muted); }
.login-btn {
  width: 100%;
  background: var(--blue); color: #fff;
  border: none; border-radius: 8px; padding: 11px;
  font-size: 14px; font-weight: 600; cursor: pointer;
  transition: background 0.12s;
}
.login-btn:hover { background: #3a97b5; }
.login-btn:disabled { opacity: 0.5; cursor: not-allowed; }
.login-msg { font-size: 13px; color: var(--accent); text-align: center; min-height: 18px; }
.login-msg.error { color: #ef6b6b; }

/* ── TOP BAR ── */
.topbar {
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 20px; height: 52px;
  background: var(--surface); border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.topbar-left { display: flex; align-items: center; gap: 10px; }
.logo { display: flex; align-items: center; gap: 9px; }
.logo-mark {
  width: 30px; height: 30px;
  background: linear-gradient(135deg, var(--blue-dim) 0%, var(--blue) 100%);
  border-radius: 7px;
  display: flex; align-items: center; justify-content: center;
  font-size: 14px; color: #fff; font-weight: 700;
}
.logo-text { font-size: 17px; font-weight: 600; letter-spacing: -0.3px; }
.logo-tag {
  font-size: 12px; color: var(--muted);
  padding: 2px 8px; background: var(--surface2); border: 1px solid var(--border);
  border-radius: 4px; margin-left: 2px;
}
.topbar-right { display: flex; align-items: center; gap: 10px; }
.user-email { font-size: 12px; color: var(--muted); }
.btn-signout {
  font-size: 12px; color: var(--muted); background: var(--surface2);
  border: 1px solid var(--border); border-radius: 5px; padding: 4px 10px;
  cursor: pointer; transition: all 0.12s;
}
.btn-signout:hover { color: var(--text); border-color: var(--border2); }

/* ── PLATFORM NAV ── */
.platform-nav {
  display: flex; align-items: center; gap: 2px;
  padding: 0 20px; height: 36px;
  background: var(--bg); border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.pnav-item {
  display: flex; align-items: center; gap: 5px;
  padding: 4px 12px; border-radius: 5px; font-size: 12px; font-weight: 500;
  color: var(--muted); text-decoration: none; transition: all 0.12s;
  white-space: nowrap;
}
.pnav-item:hover { color: var(--text); background: var(--surface); }
.pnav-item.active { color: var(--blue); background: var(--blue-bg); }
.pnav-item.muted { cursor: default; opacity: 0.4; }
.pnav-item.muted:hover { background: transparent; color: var(--muted); }

/* ── GLOBAL PROGRESS BANNER ── */
.progress-banner {
  display: flex; align-items: center; gap: 16px;
  padding: 10px 20px;
  background: var(--surface); border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.progress-track {
  flex: 1; height: 5px; background: var(--faint); border-radius: 3px; overflow: hidden;
}
.progress-fill {
  height: 100%; background: var(--blue); border-radius: 3px;
  transition: width 0.4s ease;
}
.progress-label {
  font-size: 12px; color: var(--muted); white-space: nowrap; flex-shrink: 0;
}
.progress-label strong { color: var(--blue); }
.completion-badge {
  font-size: 11px; font-weight: 600; padding: 3px 9px; border-radius: 4px;
  background: var(--blue-bg); color: var(--blue); border: 1px solid var(--blue-dim);
  white-space: nowrap; flex-shrink: 0;
}

/* ── WORKBENCH ── */
.workbench-wrap {
  flex: 1; overflow: hidden; display: flex; flex-direction: column;
}
.workbench {
  flex: 1; overflow-x: auto; overflow-y: hidden;
  display: flex; gap: 0;
  padding: 20px;
  padding-bottom: 0;
}
.workbench-inner {
  display: flex; gap: 14px; align-items: flex-start;
  min-height: 100%;
}

/* ── CATEGORY COLUMN ── */
.cat-col {
  width: 260px; flex-shrink: 0;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  display: flex; flex-direction: column;
  max-height: calc(100vh - 52px - 36px - 57px - 60px - 40px);
  overflow: hidden;
}
.cat-header {
  display: flex; align-items: center; gap: 6px;
  padding: 12px 14px 10px;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.cat-title-input {
  flex: 1; background: transparent; border: none; outline: none;
  font-size: 13px; font-weight: 600; color: var(--text);
  font-family: inherit; cursor: text;
  padding: 2px 4px; border-radius: 4px;
  transition: background 0.12s;
}
.cat-title-input:focus { background: var(--surface2); }
.cat-delete-btn {
  background: none; border: none; color: var(--muted); cursor: pointer;
  font-size: 14px; padding: 2px 4px; border-radius: 4px; line-height: 1;
  transition: all 0.12s; flex-shrink: 0;
}
.cat-delete-btn:hover { color: #ef6b6b; background: rgba(239,107,107,0.1); }

.cat-progress {
  padding: 6px 14px 8px;
  font-size: 11px; color: var(--muted);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.cat-progress span { color: var(--blue); font-weight: 600; }

.cat-terms {
  flex: 1; overflow-y: auto; padding: 8px;
  display: flex; flex-direction: column; gap: 4px;
}
.cat-terms::-webkit-scrollbar { width: 4px; }
.cat-terms::-webkit-scrollbar-track { background: transparent; }
.cat-terms::-webkit-scrollbar-thumb { background: var(--faint); border-radius: 2px; }

/* ── TERM ROW ── */
.term-row {
  display: flex; align-items: center; gap: 6px;
  padding: 7px 8px; border-radius: 6px;
  background: var(--surface2); border: 1px solid var(--border);
  transition: border-color 0.12s;
  min-height: 36px;
}
.term-row:hover { border-color: var(--border2); }
.term-row.is-defined { border-color: rgba(75,168,200,0.25); }

.term-text-input {
  flex: 1; background: transparent; border: none; outline: none;
  font-size: 13px; color: var(--text); font-family: inherit; cursor: pointer;
  padding: 0; min-width: 0;
}
.term-text-input:focus { cursor: text; }
.term-text-input::placeholder { color: var(--muted); }

.term-status {
  flex-shrink: 0; padding: 2px 7px; border-radius: 3px;
  font-size: 10px; font-weight: 700; letter-spacing: 0.4px; text-transform: uppercase;
  cursor: pointer; transition: all 0.12s; white-space: nowrap;
  border: 1px solid transparent;
}
.term-status.pending {
  background: rgba(107,122,141,0.15); color: var(--muted); border-color: var(--border);
}
.term-status.pending:hover {
  background: rgba(75,168,200,0.12); color: var(--blue); border-color: var(--blue-dim);
}
.term-status.defined {
  background: rgba(75,168,200,0.15); color: var(--blue); border-color: var(--blue-dim);
}
.term-status.defined:hover {
  background: rgba(107,122,141,0.12); color: var(--muted); border-color: var(--border);
}

.term-delete {
  flex-shrink: 0; background: none; border: none; color: var(--muted);
  cursor: pointer; font-size: 13px; padding: 2px 3px; border-radius: 3px;
  line-height: 1; opacity: 0; transition: opacity 0.12s, color 0.12s;
}
.term-row:hover .term-delete { opacity: 1; }
.term-delete:hover { color: #ef6b6b; }

/* ── ADD TERM AREA ── */
.cat-add-area {
  padding: 8px;
  flex-shrink: 0;
  border-top: 1px solid var(--border);
}
.add-term-input-row {
  display: none; gap: 6px; align-items: center;
}
.add-term-input-row.visible { display: flex; }
.add-term-input {
  flex: 1; background: var(--surface3); border: 1px solid var(--blue-dim);
  border-radius: 6px; padding: 6px 10px; font-size: 13px; color: var(--text);
  font-family: inherit; outline: none;
}
.add-term-input::placeholder { color: var(--muted); }
.add-term-cancel {
  background: none; border: none; color: var(--muted); cursor: pointer; font-size: 16px;
  padding: 2px 4px; border-radius: 4px; line-height: 1;
}
.add-term-cancel:hover { color: var(--text); }

.btn-add-term {
  width: 100%; background: none; border: 1px dashed var(--border2);
  border-radius: 6px; padding: 6px; font-size: 12px; color: var(--muted);
  cursor: pointer; font-family: inherit; transition: all 0.12s; text-align: center;
}
.btn-add-term:hover { border-color: var(--blue); color: var(--blue); background: var(--blue-bg); }

/* ── ADD CATEGORY COLUMN ── */
.col-add-btn {
  width: 180px; flex-shrink: 0; align-self: flex-start;
  background: var(--surface); border: 1px dashed var(--border2);
  border-radius: 10px; padding: 20px 14px; text-align: center;
  color: var(--muted); cursor: pointer; font-size: 13px; font-family: inherit;
  transition: all 0.15s;
}
.col-add-btn:hover { border-color: var(--blue); color: var(--blue); background: var(--blue-bg); }

/* ── BOTTOM ACTION BAR ── */
.action-bar {
  display: flex; align-items: center; justify-content: space-between;
  padding: 10px 20px; height: 56px;
  background: var(--surface); border-top: 1px solid var(--border);
  flex-shrink: 0; gap: 12px;
}
.action-bar-left { font-size: 13px; color: var(--muted); }
.action-bar-left strong { color: var(--text); }
.action-bar-right { display: flex; gap: 10px; align-items: center; }

.btn {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 7px 16px; border-radius: 7px; font-size: 13px; font-weight: 500;
  cursor: pointer; border: none; font-family: inherit; transition: all 0.12s;
  text-decoration: none;
}
.btn-ghost {
  background: var(--surface2); color: var(--muted); border: 1px solid var(--border);
}
.btn-ghost:hover { background: var(--surface3); color: var(--text); border-color: var(--border2); }
.btn-primary {
  background: var(--blue); color: #fff;
}
.btn-primary:hover { background: #3a97b5; }

/* ── TOAST ── */
.toast {
  position: fixed; bottom: 72px; right: 20px;
  background: var(--surface2); border: 1px solid var(--border2);
  border-radius: 7px; padding: 8px 16px; font-size: 13px; color: var(--accent);
  display: flex; align-items: center; gap: 8px;
  opacity: 0; pointer-events: none;
  transform: translateY(8px);
  transition: opacity 0.2s, transform 0.2s;
  z-index: 50;
}
.toast.show { opacity: 1; transform: translateY(0); pointer-events: auto; }
.toast::before { content: '✓'; font-weight: 700; }

/* ── CONFIRM MODAL ── */
.modal-overlay {
  display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 80;
  align-items: center; justify-content: center;
}
.modal-overlay.visible { display: flex; }
.modal-box {
  background: var(--surface); border: 1px solid var(--border2); border-radius: 12px;
  padding: 28px; width: 340px; display: flex; flex-direction: column; gap: 16px;
}
.modal-title { font-size: 16px; font-weight: 600; }
.modal-body { font-size: 13px; color: var(--muted); line-height: 1.5; }
.modal-actions { display: flex; justify-content: flex-end; gap: 10px; }
.btn-danger { background: rgba(239,107,107,0.15); color: #ef6b6b; border: 1px solid rgba(239,107,107,0.3); }
.btn-danger:hover { background: rgba(239,107,107,0.25); }

/* ── SCROLLBAR ── */
.workbench::-webkit-scrollbar { height: 6px; }
.workbench::-webkit-scrollbar-track { background: transparent; }
.workbench::-webkit-scrollbar-thumb { background: var(--faint); border-radius: 3px; }
</style>
</head>

<!-- LOGIN SCREEN -->
<div id="login-screen">

<!-- TOAST -->

<script>
// ── SUPABASE ──────────────────────────────────────────────
const SUPA_URL = 'https://ilhljjkiijmjpwinovzj.supabase.co';
const SUPA_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImlsaGxqamtpaWptanB3aW5vdnpqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM2MTk4MjIsImV4cCI6MjA5OTE5NTgyMn0.w8asDSA-rXuaDfujC2dr4J-EKCzlCVABOuq3VQeeFsE';
const supa = supabase.createClient(SUPA_URL, SUPA_KEY);

// ── DEFAULTS ──────────────────────────────────────────────
const DEFAULT_TAXONOMY = {
  categories: [
    {
      id: 'practice_areas',
      label: 'Practice Areas',
      terms: [
        { id: uid(), text: 'Strategy Consulting',     status: 'defined'  },
        { id: uid(), text: 'Digital Transformation',  status: 'defined'  },
        { id: uid(), text: 'M&A Integration',          status: 'pending'  },
        { id: uid(), text: 'Talent & Org Design',      status: 'pending'  },
      ]
    },
    {
      id: 'target_markets',
      label: 'Target Markets',
      terms: [
        { id: uid(), text: 'Fortune 1000',             status: 'defined'  },
        { id: uid(), text: 'High-Growth Mid-Market',   status: 'defined'  },
        { id: uid(), text: 'PE-Backed Firms',          status: 'pending'  },
        { id: uid(), text: 'Family-Owned Enterprise',  status: 'pending'  },
      ]
    },
    {
      id: 'delivery_models',
      label: 'Delivery Models',
      terms: [
        { id: uid(), text: 'Multi-Month Engagement',   status: 'defined'  },
        { id: uid(), text: 'Fractional Leadership',    status: 'pending'  },
        { id: uid(), text: 'Project Sprint',           status: 'pending'  },
        { id: uid(), text: 'Advisory Retainer',        status: 'defined'  },
      ]
    },
    {
      id: 'buyer_personas',
      label: 'Buyer Personas',
      terms: [
        { id: uid(), text: 'CEO / Founder',            status: 'defined'  },
        { id: uid(), text: 'CFO',                      status: 'defined'  },
        { id: uid(), text: 'CHRO',                     status: 'pending'  },
        { id: uid(), text: 'VP Corporate Development', status: 'pending'  },
      ]
    }
  ]
};

// ── STATE ─────────────────────────────────────────────────
let taxonomy = null;
let currentUser = null;
let saveTimer = null;
let modalCallback = null;

// ── UTILS ─────────────────────────────────────────────────
function uid() {
  return (typeof crypto !== 'undefined' && crypto.randomUUID)
    ? crypto.randomUUID()
    : Math.random().toString(36).slice(2) + Date.now().toString(36);
}

function deepClone(obj) { return JSON.parse(JSON.stringify(obj)); }

// ── AUTH ──────────────────────────────────────────────────
async function initAuth() {
  const { data: { session } } = await supa.auth.getSession();
  if (session) {
    await enterApp(session.user);
  } else {
    showLogin();
  }

  supa.auth.onAuthStateChange(async (event, session) => {
    if (event === 'SIGNED_IN' && session) {
      await enterApp(session.user);
    } else if (event === 'SIGNED_OUT') {
      showLogin();
    }
  });
}

function showLogin() {
  document.getElementById('login-screen').classList.add('visible');
  document.getElementById('app').style.display = 'none';
}

async function enterApp(user) {
  currentUser = user;
  document.getElementById('login-screen').classList.remove('visible');
  document.getElementById('app').style.display = 'flex';
  document.getElementById('user-email-display').textContent = user.email;
  await loadTaxonomy();
  render();
}

document.getElementById('login-btn').addEventListener('click', async () => {
  const email = document.getElementById('login-email').value.trim();
  if (!email) return;
  const btn = document.getElementById('login-btn');
  const msg = document.getElementById('login-msg');
  btn.disabled = true;
  btn.textContent = 'Sending…';
  msg.className = 'login-msg';
  msg.textContent = '';
  const { error } = await supa.auth.signInWithOtp({
    email,
    options: { emailRedirectTo: 'https://vector.brittbowman.ai/resolve.html' }
  });
  btn.disabled = false;
  btn.textContent = 'Send Magic Link';
  if (error) {
    msg.textContent = error.message;
    msg.className = 'login-msg error';
  } else {
    msg.textContent = 'Check your email for the magic link.';
  }
});

document.getElementById('login-email').addEventListener('keydown', e => {
  if (e.key === 'Enter') document.getElementById('login-btn').click();
});

document.getElementById('signout-btn').addEventListener('click', async () => {
  await supa.auth.signOut();
});

// ── DATA PERSISTENCE ──────────────────────────────────────
async function loadTaxonomy() {
  // 1. Try localStorage
  try {
    const raw = localStorage.getItem('resolve_taxonomy');
    if (raw) {
      taxonomy = JSON.parse(raw);
      return;
    }
  } catch (_) {}

  // 2. Try Supabase
  if (currentUser) {
    try {
      const { data, error } = await supa
        .from('resolve_taxonomy')
        .select('taxonomy')
        .eq('user_id', currentUser.id)
        .maybeSingle();
      if (!error && data?.taxonomy) {
        taxonomy = data.taxonomy;
        localStorage.setItem('resolve_taxonomy', JSON.stringify(taxonomy));
        return;
      }
    } catch (_) {}
  }

  // 3. Defaults
  taxonomy = deepClone(DEFAULT_TAXONOMY);
  persistLocal();
}

function persistLocal() {
  try { localStorage.setItem('resolve_taxonomy', JSON.stringify(taxonomy)); } catch (_) {}
}

async function persistSupabase() {
  if (!currentUser) return;
  try {
    await supa.from('resolve_taxonomy').upsert({
      user_id: currentUser.id,
      taxonomy: taxonomy,
      updated_at: new Date().toISOString()
    }, { onConflict: 'user_id' });
  } catch (_) {} // fail silently
}

function scheduleSave() {
  clearTimeout(saveTimer);
  saveTimer = setTimeout(async () => {
    persistLocal();
    await persistSupabase();
    showToast();
  }, 800);
}

function showToast() {
  const t = document.getElementById('toast');
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

// ── RENDER ────────────────────────────────────────────────
function render() {
  renderWorkbench();
  updateProgress();
}

function renderWorkbench() {
  const container = document.getElementById('workbench-inner');
  container.innerHTML = '';

  taxonomy.categories.forEach(cat => {
    container.appendChild(buildCatCol(cat));
  });

  // Add Category button
  const addColBtn = document.createElement('button');
  addColBtn.className = 'col-add-btn';
  addColBtn.textContent = '+ Add Category';
  addColBtn.addEventListener('click', addCategory);
  container.appendChild(addColBtn);
}

function buildCatCol(cat) {
  const col = document.createElement('div');
  col.className = 'cat-col';
  col.dataset.catId = cat.id;

  // Header
  const header = document.createElement('div');
  header.className = 'cat-header';

  const titleInput = document.createElement('input');
  titleInput.type = 'text';
  titleInput.className = 'cat-title-input';
  titleInput.value = cat.label;
  titleInput.spellcheck = false;
  titleInput.addEventListener('change', e => {
    cat.label = e.target.value;
    scheduleSave();
    updateProgress();
  });

  const delBtn = document.createElement('button');
  delBtn.className = 'cat-delete-btn';
  delBtn.title = 'Delete category';
  delBtn.textContent = '×';
  delBtn.addEventListener('click', () => confirmDeleteCategory(cat));

  header.appendChild(titleInput);
  header.appendChild(delBtn);

  // Progress sub-header
  const progressEl = document.createElement('div');
  progressEl.className = 'cat-progress';
  const defined = cat.terms.filter(t => t.status === 'defined').length;
  progressEl.innerHTML = `<span>${defined}</span> of ${cat.terms.length} defined`;
  progressEl.dataset.catProgressId = cat.id;

  // Terms list
  const termsList = document.createElement('div');
  termsList.className = 'cat-terms';
  termsList.dataset.termsListId = cat.id;

  cat.terms.forEach(term => {
    termsList.appendChild(buildTermRow(cat, term, termsList));
  });

  // Add term area
  const addArea = document.createElement('div');
  addArea.className = 'cat-add-area';

  const addInputRow = document.createElement('div');
  addInputRow.className = 'add-term-input-row';

  const addInput = document.createElement('input');
  addInput.type = 'text';
  addInput.className = 'add-term-input';
  addInput.placeholder = 'New term…';

  const addCancel = document.createElement('button');
  addCancel.className = 'add-term-cancel';
  addCancel.textContent = '×';

  addInputRow.appendChild(addInput);
  addInputRow.appendChild(addCancel);

  const addBtn = document.createElement('button');
  addBtn.className = 'btn-add-term';
  addBtn.textContent = '+ Add term';

  addBtn.addEventListener('click', () => {
    addInputRow.classList.add('visible');
    addBtn.style.display = 'none';
    addInput.focus();
  });

  addCancel.addEventListener('click', () => {
    addInputRow.classList.remove('visible');
    addBtn.style.display = '';
    addInput.value = '';
  });

  function commitAddTerm() {
    const text = addInput.value.trim();
    if (!text) return;
    const newTerm = { id: uid(), text, status: 'pending' };
    cat.terms.push(newTerm);
    termsList.appendChild(buildTermRow(cat, newTerm, termsList));
    addInput.value = '';
    updateCatProgress(cat);
    updateProgress();
    scheduleSave();
  }

  addInput.addEventListener('keydown', e => {
    if (e.key === 'Enter') {
      commitAddTerm();
      // keep open for next entry
    } else if (e.key === 'Escape') {
      addCancel.click();
    }
  });
  addInput.addEventListener('blur', () => {
    // small delay so cancel click fires first
    setTimeout(() => {
      if (document.activeElement !== addInput && addInput.value.trim()) {
        commitAddTerm();
      }
    }, 150);
  });

  addArea.appendChild(addInputRow);
  addArea.appendChild(addBtn);

  col.appendChild(header);
  col.appendChild(progressEl);
  col.appendChild(termsList);
  col.appendChild(addArea);

  return col;
}

function buildTermRow(cat, term, termsList) {
  const row = document.createElement('div');
  row.className = 'term-row' + (term.status === 'defined' ? ' is-defined' : '');
  row.dataset.termId = term.id;

  const textInput = document.createElement('input');
  textInput.type = 'text';
  textInput.className = 'term-text-input';
  textInput.value = term.text;
  textInput.spellcheck = false;
  textInput.addEventListener('change', e => {
    term.text = e.target.value;
    scheduleSave();
  });
  textInput.addEventListener('keydown', e => {
    if (e.key === 'Enter') {
      textInput.blur();
      // focus next add-term btn in column
      const col = row.closest('.cat-col');
      col.querySelector('.btn-add-term')?.click();
    } else if (e.key === 'Escape') {
      textInput.value = term.text;
      textInput.blur();
    }
  });

  const statusBtn = document.createElement('button');
  statusBtn.className = `term-status ${term.status}`;
  statusBtn.textContent = term.status === 'defined' ? 'Defined' : 'Pending';
  statusBtn.addEventListener('click', () => {
    term.status = term.status === 'defined' ? 'pending' : 'defined';
    statusBtn.className = `term-status ${term.status}`;
    statusBtn.textContent = term.status === 'defined' ? 'Defined' : 'Pending';
    row.classList.toggle('is-defined', term.status === 'defined');
    updateCatProgress(cat);
    updateProgress();
    scheduleSave();
  });

  const delBtn = document.createElement('button');
  delBtn.className = 'term-delete';
  delBtn.title = 'Remove term';
  delBtn.textContent = '×';
  delBtn.addEventListener('click', () => {
    cat.terms = cat.terms.filter(t => t.id !== term.id);
    row.remove();
    updateCatProgress(cat);
    updateProgress();
    scheduleSave();
  });

  row.appendChild(textInput);
  row.appendChild(statusBtn);
  row.appendChild(delBtn);

  return row;
}

function updateCatProgress(cat) {
  const el = document.querySelector(`[data-cat-progress-id="${cat.id}"]`);
  if (!el) return;
  const defined = cat.terms.filter(t => t.status === 'defined').length;
  el.innerHTML = `<span>${defined}</span> of ${cat.terms.length} defined`;
}

function updateProgress() {
  let total = 0, defined = 0;
  taxonomy.categories.forEach(cat => {
    total += cat.terms.length;
    defined += cat.terms.filter(t => t.status === 'defined').length;
  });
  const pct = total ? Math.round(defined / total * 100) : 0;
  const pending = total - defined;

  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('progress-label').innerHTML =
    `<strong>${pct}%</strong> complete`;
  document.getElementById('completion-badge').textContent =
    `Taxonomy ${pct}% complete · ${defined} defined · ${pending} pending`;
  document.getElementById('action-status').innerHTML =
    `<strong>${defined} of ${total}</strong> terms defined · ${pct}%`;
}

// ── CATEGORY MANAGEMENT ───────────────────────────────────
function addCategory() {
  const cat = {
    id: uid(),
    label: 'New Category',
    terms: []
  };
  taxonomy.categories.push(cat);
  renderWorkbench();
  updateProgress();
  scheduleSave();

  // Focus the new column's title
  setTimeout(() => {
    const col = document.querySelector(`[data-cat-id="${cat.id}"]`);
    col?.querySelector('.cat-title-input')?.select();
  }, 50);
}

function confirmDeleteCategory(cat) {
  document.getElementById('modal-title').textContent = `Delete "${cat.label}"?`;
  document.getElementById('modal-body').textContent =
    `This will remove all ${cat.terms.length} terms in this category. This cannot be undone.`;
  document.getElementById('confirm-modal').classList.add('visible');
  modalCallback = () => deleteCategory(cat);
}

function deleteCategory(cat) {
  taxonomy.categories = taxonomy.categories.filter(c => c.id !== cat.id);
  renderWorkbench();
  updateProgress();
  scheduleSave();
}

document.getElementById('modal-cancel').addEventListener('click', () => {
  document.getElementById('confirm-modal').classList.remove('visible');
  modalCallback = null;
});
document.getElementById('modal-confirm').addEventListener('click', () => {
  document.getElementById('confirm-modal').classList.remove('visible');
  if (modalCallback) { modalCallback(); modalCallback = null; }
});

// ── EXPORT ────────────────────────────────────────────────
document.getElementById('btn-export').addEventListener('click', () => {
  // Also build taxFields format for vector.html compatibility
  const taxFields = taxonomy.categories.map(cat => ({
    key: cat.label,
    values: cat.terms.filter(t => t.status === 'defined').map(t => t.text)
  }));

  const exportData = {
    exported_at: new Date().toISOString(),
    taxonomy,
    taxFields
  };

  const blob = new Blob([JSON.stringify(exportData, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `resolve-taxonomy-${new Date().toISOString().slice(0,10)}.json`;
  a.click();
  URL.revokeObjectURL(url);
});

// ── BOOT ──────────────────────────────────────────────────
initAuth();
</script>
